
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pickleball Scheduler Pro v1.2</title>
<style>
:root{
  --bg:#f4f7fb;--panel:#ffffff;--text:#172033;--muted:#6b7280;--line:#e5e7eb;
  --primary:#2563eb;--primary2:#1d4ed8;--ok:#16a34a;--warn:#d97706;--danger:#dc2626;
  --shadow:0 18px 45px rgba(15,23,42,.08);--radius:20px;
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:
linear-gradient(180deg,#eef4ff 0,#f8fafc 38%,#f4f7fb 100%);color:var(--text)}
.wrap{max-width:1180px;margin:auto;padding:32px 20px 70px}
.hero{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;margin-bottom:22px}
.hero h1{margin:0;font-size:clamp(28px,4vw,48px);letter-spacing:-.03em}
.hero p{margin:8px 0 0;color:var(--muted)}
.badge{background:#dbeafe;color:#1e40af;padding:8px 12px;border-radius:999px;font-weight:700;font-size:13px}
.layout{display:grid;grid-template-columns:360px 1fr;gap:22px}
.card{background:rgba(255,255,255,.94);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.7);
border-radius:var(--radius);box-shadow:var(--shadow);padding:22px}
h2,h3{margin:0 0 14px}
.label{display:block;font-size:13px;font-weight:700;margin-bottom:7px}
.field{margin-bottom:16px}
select,input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:#fff;font-size:15px;outline:none}
select:focus,input:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(37,99,235,.1)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.players{display:grid;gap:9px;margin-top:8px}
.player-row{display:grid;grid-template-columns:minmax(0,1fr) 130px;gap:9px}
.dupr-input{text-align:center;font-variant-numeric:tabular-nums}
@media(max-width:430px){.player-row{grid-template-columns:1fr 112px}}
.btnrow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
button{border:0;border-radius:12px;padding:12px 14px;font-weight:800;cursor:pointer;transition:.18s}
button:hover{transform:translateY(-1px)}
.primary{background:linear-gradient(135deg,var(--primary),var(--primary2));color:#fff;box-shadow:0 10px 22px rgba(37,99,235,.25)}
.secondary{background:#eef2ff;color:#3730a3}
.ghost{background:#f8fafc;color:#334155;border:1px solid var(--line)}
.danger{background:#fef2f2;color:#991b1b}
.note{font-size:13px;color:var(--muted);line-height:1.55;margin-top:12px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.metric{background:#f8fafc;border:1px solid var(--line);border-radius:16px;padding:15px}
.metric b{display:block;font-size:24px;margin-top:3px}
.metric span{font-size:12px;color:var(--muted)}
.scorebar{height:10px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:8px}
.scorebar i{display:block;height:100%;background:linear-gradient(90deg,#22c55e,#3b82f6)}
.toolbar{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:16px}
.schedule{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.match{border:1px solid var(--line);border-radius:18px;padding:16px;background:linear-gradient(180deg,#fff,#f8fafc)}
.matchhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:13px}
.round{font-weight:900}.court{font-size:12px;color:var(--muted)}
.teams{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;text-align:center}
.team{background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 10px;font-weight:800}
.vs{font-size:12px;color:var(--muted);font-weight:900}
.stats{width:100%;border-collapse:collapse;margin-top:10px;font-size:14px}
.stats th,.stats td{padding:11px 10px;border-bottom:1px solid var(--line);text-align:left}
.stats th{color:var(--muted);font-size:12px}
.empty{padding:52px 20px;text-align:center;color:var(--muted);border:1px dashed #cbd5e1;border-radius:18px}
.alert{padding:13px 15px;border-radius:12px;margin-bottom:14px;font-size:14px}
.alert.ok{background:#f0fdf4;color:#166534}.alert.warn{background:#fff7ed;color:#9a3412}
.small{font-size:12px;color:var(--muted)}
footer{text-align:center;color:var(--muted);font-size:12px;margin-top:26px}
@media(max-width:900px){.layout{grid-template-columns:1fr}.schedule{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.hero{align-items:flex-start;flex-direction:column}.grid2,.btnrow,.metrics{grid-template-columns:1fr}.wrap{padding:22px 14px 50px}}
@media print{
  body{background:#fff}.wrap{max-width:none;padding:0}.hero,.sidebar,.toolbar,footer{display:none!important}
  .card{box-shadow:none;border:0;padding:0}.schedule{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div>
      <h1>Pickleball Scheduler Pro</h1>
      <p>雙打公平排程工具｜DUPR 實力平衡｜搭檔不重複｜不可連打三場</p>
    </div>
    <div class="badge">v1.2 DUPR＋主客場版</div>
  </div>

  <div class="layout">
    <aside class="card sidebar">
      <h2>排程設定</h2>
      <div class="grid2">
        <div class="field">
          <label class="label">球員人數</label>
          <select id="playerCount"></select>
        </div>
        <div class="field">
          <label class="label">比賽場數</label>
          <input id="roundCount" type="number" min="1" max="30" value="12">
        </div>
      </div>
      <div class="field">
        <label class="label">搜尋強度</label>
        <select id="attempts">
          <option value="800">快速</option>
          <option value="3000" selected>公平</option>
          <option value="9000">最佳化</option>
        </select>
      </div>
      <div class="field">
        <label class="label">球員姓名</label>
        <div id="players" class="players"></div>
      </div>
      <div class="btnrow">
        <button class="secondary" id="sampleBtn">範例名單</button>
        <button class="ghost" id="clearBtn">清空姓名</button>
      </div>
      <button class="primary" id="generateBtn" style="width:100%;margin-top:10px">產生最佳賽程</button>
      <p class="note">
        硬性規則：每場 4 人、搭檔不重複、任何球員不可連續出賽 3 場。<br>
        軟性目標：出賽平均、休息平均、對手分布平均，並讓兩隊平均 DUPR 分差盡可能小。NR 球員暫以本次已評分球員的平均值估算。
      </p>
    </aside>

    <main class="card">
      <div id="message"></div>
      <div id="metrics" class="metrics" style="display:none"></div>
      <div class="toolbar">
        <button class="ghost" id="copyBtn">複製賽程</button>
        <button class="ghost" id="csvBtn">下載 CSV</button>
        <button class="ghost" onclick="window.print()">列印</button>
      </div>
      <div id="schedule" class="empty">請先輸入球員姓名並產生賽程。</div>
      <div id="statsWrap" style="display:none;margin-top:22px">
        <h3>球員統計</h3>
        <div style="overflow:auto">
          <table class="stats">
            <thead><tr><th>球員</th><th>DUPR</th><th>出賽</th><th>休息</th><th>不同搭檔</th><th>不同對手</th></tr></thead>
            <tbody id="statsBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
  <footer>Pickleball Scheduler Pro v1.2｜資料只保存在本機瀏覽器</footer>
</div>

<script>
const $ = s => document.querySelector(s);
const playerCount = $('#playerCount');
const playersBox = $('#players');
const scheduleEl = $('#schedule');
const statsBody = $('#statsBody');
const statsWrap = $('#statsWrap');
const metricsEl = $('#metrics');
const messageEl = $('#message');
let lastResult = null;

for(let i=4;i<=8;i++) playerCount.add(new Option(i+' 人',i));
playerCount.value = localStorage.getItem('pb_count') || '8';

function renderPlayers(){
  const old=[...playersBox.querySelectorAll('input')].map(x=>x.value);
  playersBox.innerHTML='';
  const oldDupr=[...playersBox.querySelectorAll('.dupr-input')].map(x=>x.value);
  for(let i=0;i<+playerCount.value;i++){
    const row=document.createElement('div');
    row.className='player-row';
    row.innerHTML=`
      <input class="name-input" placeholder="球員 ${i+1}" value="${old[i] || ''}">
      <input class="dupr-input" placeholder="NR 或 3.500" value="${oldDupr[i] || 'NR'}" inputmode="decimal" maxlength="6">
    `;
    playersBox.appendChild(row);
  }
  saveSettings();
}
playerCount.addEventListener('change',renderPlayers);

function saveSettings(){
  localStorage.setItem('pb_count',playerCount.value);
  localStorage.setItem('pb_rounds',$('#roundCount').value);
  localStorage.setItem('pb_names',JSON.stringify([...playersBox.querySelectorAll('.name-input')].map(x=>x.value)));
  localStorage.setItem('pb_dupr',JSON.stringify([...playersBox.querySelectorAll('.dupr-input')].map(x=>x.value)));
}
function restore(){
  $('#roundCount').value=localStorage.getItem('pb_rounds')||12;
  renderPlayers();
  try{
    const names=JSON.parse(localStorage.getItem('pb_names')||'[]');
    [...playersBox.querySelectorAll('.name-input')].forEach((x,i)=>x.value=names[i]||'');
    const duprs=JSON.parse(localStorage.getItem('pb_dupr')||'[]');
    [...playersBox.querySelectorAll('.dupr-input')].forEach((x,i)=>x.value=duprs[i]||'NR');
  }catch(e){}
}
restore();

$('#sampleBtn').onclick=()=>{
  const names=['王小明','陳志豪','林冠廷','張雅婷','李俊豪','黃詩涵','周柏宇','吳佳穎'];
  const duprs=['3.250','3.500','3.750','4.000','4.250','4.500','4.750','5.000'];
  [...playersBox.querySelectorAll('.name-input')].forEach((x,i)=>x.value=names[i]);
  [...playersBox.querySelectorAll('.dupr-input')].forEach((x,i)=>x.value=duprs[i]||'NR');
  saveSettings();
};
$('#clearBtn').onclick=()=>{
  [...playersBox.querySelectorAll('.name-input')].forEach(x=>x.value='');
  [...playersBox.querySelectorAll('.dupr-input')].forEach(x=>x.value='NR');
  saveSettings();
};

function pairKey(a,b){return [a,b].sort((x,y)=>x-y).join('-')}
function combinations(arr,k){
  const out=[];
  function rec(start,pick){
    if(pick.length===k){out.push([...pick]);return}
    for(let i=start;i<=arr.length-(k-pick.length);i++){
      pick.push(arr[i]);rec(i+1,pick);pick.pop();
    }
  } rec(0,[]); return out;
}
function pairings4(g){
  const [a,b,c,d]=g;
  return [
    [[a,b],[c,d]],
    [[a,c],[b,d]],
    [[a,d],[b,c]]
  ];
}
function shuffled(a){
  a=[...a];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}
  return a;
}
function parseDupr(raw){
  const value=String(raw??'').trim().toUpperCase();
  if(value===''||value==='NR') return null;
  const n=Number(value);
  return Number.isFinite(n)&&n>=0&&n<=10 ? Math.round(n*1000)/1000 : NaN;
}
function normalizedRatings(rawRatings){
  const known=rawRatings.filter(v=>Number.isFinite(v));
  const fallback=known.length ? known.reduce((a,b)=>a+b,0)/known.length : 3.5;
  return rawRatings.map(v=>Number.isFinite(v)?v:fallback);
}
function teamRating(team,ratings){
  return (ratings[team[0]]+ratings[team[1]])/2;
}
function matchupSkillCost(g,teams,ratings,rawRatings){
  const a=teamRating(teams[0],ratings), b=teamRating(teams[1],ratings);
  const teamGap=Math.abs(a-b);
  const vals=g.map(p=>ratings[p]);
  const groupSpread=Math.max(...vals)-Math.min(...vals);
  const unknowns=g.filter(p=>rawRatings[p]===null).length;
  return teamGap*42 + groupSpread*5 + unknowns*0.6;
}
function buildCandidate(n,rounds,rawRatings){
  const players=[...Array(n).keys()];
  const ratings=normalizedRatings(rawRatings);
  const groups=shuffled(combinations(players,4));
  const usedPairs=new Set();
  const schedule=[];
  const playCounts=Array(n).fill(0);
  const opponentCounts=Array.from({length:n},()=>Array(n).fill(0));

  for(let r=0;r<rounds;r++){
    let best=null,bestCost=Infinity;
    const options=shuffled(groups).slice(0,Math.min(groups.length,70));
    for(const g of options){
      if(r>=2){
        let bad=false;
        for(const p of g){
          if(schedule[r-1].players.includes(p)&&schedule[r-2].players.includes(p)){bad=true;break}
        }
        if(bad) continue;
      }
      for(const teams of pairings4(g)){
        const pk1=pairKey(...teams[0]),pk2=pairKey(...teams[1]);
        if(usedPairs.has(pk1)||usedPairs.has(pk2)) continue;
        const projected=[...playCounts];
        g.forEach(p=>projected[p]++);
        const spread=Math.max(...projected)-Math.min(...projected);
        let oppPenalty=0;
        for(const a of teams[0]) for(const b of teams[1]) oppPenalty+=opponentCounts[a][b];
        let streakPenalty=0;
        if(r>=1) for(const p of g) if(schedule[r-1].players.includes(p)) streakPenalty+=0.35;
        const skillPenalty=matchupSkillCost(g,teams,ratings,rawRatings);
        const cost=spread*20+oppPenalty*3+streakPenalty+skillPenalty+Math.random();
        if(cost<bestCost){bestCost=cost;best={players:g,teams}}
      }
    }
    if(!best) return null;
    if(Math.random()<0.5){ best.home=0; best.away=1; }
    else{ best.home=1; best.away=0; }
    schedule.push(best);
    usedPairs.add(pairKey(...best.teams[0]));usedPairs.add(pairKey(...best.teams[1]));
    best.players.forEach(p=>playCounts[p]++);
    for(const a of best.teams[0])for(const b of best.teams[1]){
      opponentCounts[a][b]++;opponentCounts[b][a]++;
    }
  }
  return schedule;
}
function analyze(schedule,n,rawRatings){
  const played=Array(n).fill(0), partners=Array.from({length:n},()=>new Set()),
        opponents=Array.from({length:n},()=>new Set());
  for(const m of schedule){
    m.players.forEach(p=>played[p]++);
    const [t1,t2]=m.teams;
    partners[t1[0]].add(t1[1]);partners[t1[1]].add(t1[0]);
    partners[t2[0]].add(t2[1]);partners[t2[1]].add(t2[0]);
    for(const a of t1)for(const b of t2){opponents[a].add(b);opponents[b].add(a)}
  }
  const spread=Math.max(...played)-Math.min(...played);
  const ratings=normalizedRatings(rawRatings);
  const teamGaps=schedule.map(m=>Math.abs(teamRating(m.teams[0],ratings)-teamRating(m.teams[1],ratings)));
  const avgTeamGap=teamGaps.length?teamGaps.reduce((a,b)=>a+b,0)/teamGaps.length:0;
  const maxTeamGap=teamGaps.length?Math.max(...teamGaps):0;
  const avgPartner=partners.reduce((s,x)=>s+x.size,0)/n;
  const avgOpponent=opponents.reduce((s,x)=>s+x.size,0)/n;
  let score=100-spread*8-(Math.max(0,n-1-avgPartner))*2-(Math.max(0,n-1-avgOpponent))*1.3-avgTeamGap*5;
  score=Math.max(0,Math.min(100,score));
  return {played,partners,opponents,spread,score,avgTeamGap,maxTeamGap};
}
function searchBest(n,rounds,attempts,rawRatings){
  let best=null,bestA=null;
  for(let i=0;i<attempts;i++){
    const s=buildCandidate(n,rounds,rawRatings);
    if(!s) continue;
    const a=analyze(s,n,rawRatings);
    if(!bestA||a.score>bestA.score){best=s;bestA=a;if(a.score>=99.5)break}
  }
  return best?{schedule:best,analysis:bestA}:null;
}
function names(){
  return [...playersBox.querySelectorAll('.name-input')].map((x,i)=>x.value.trim()||`球員${i+1}`);
}
function duprValues(){
  return [...playersBox.querySelectorAll('.dupr-input')].map(x=>parseDupr(x.value));
}
function duprLabels(){
  return [...playersBox.querySelectorAll('.dupr-input')].map(x=>{
    const v=parseDupr(x.value);
    return v===null?'NR':Number.isNaN(v)?'無效':v.toFixed(3);
  });
}
function renderResult(result,ns,rounds,rawRatings,duprText){
  lastResult={...result,names:ns,duprText};
  const a=result.analysis;
  messageEl.innerHTML=`<div class="alert ok">已完成 ${rounds} 場排程。搭檔無重複，且無人連續出賽 3 場。</div>`;
  metricsEl.style.display='grid';
  metricsEl.innerHTML=`
    <div class="metric"><span>公平度</span><b>${a.score.toFixed(1)}%</b><div class="scorebar"><i style="width:${a.score}%"></i></div></div>
    <div class="metric"><span>出賽差距</span><b>${a.spread}</b><span>場</span></div>
    <div class="metric"><span>比賽場數</span><b>${rounds}</b><span>場</span></div>
    <div class="metric"><span>平均隊伍分差</span><b>${a.avgTeamGap.toFixed(3)}</b><span>DUPR</span></div>`;
  scheduleEl.className='schedule';
  scheduleEl.innerHTML=result.schedule.map((m,i)=>`
    <div class="match">
      <div class="matchhead"><div class="round">第 ${i+1} 場</div><div class="court">雙打</div></div>
      <div class="teams">
        <div class="team">
          <span class="small"><b>${m.home===0?'主場':'客場'}</b></span><br>
          ${ns[m.teams[0][0]]} <span class="small">${duprText[m.teams[0][0]]}</span><br>
          ${ns[m.teams[0][1]]} <span class="small">${duprText[m.teams[0][1]]}</span><br>
          <span class="small">隊伍平均 ${teamRating(m.teams[0],normalizedRatings(rawRatings)).toFixed(3)}</span>
        </div>
        <div class="vs">主場 VS 客場<br><span class="small">差 ${Math.abs(teamRating(m.teams[0],normalizedRatings(rawRatings))-teamRating(m.teams[1],normalizedRatings(rawRatings))).toFixed(3)}</span></div>
        <div class="team">
          <span class="small"><b>${m.home===1?'主場':'客場'}</b></span><br>
          ${ns[m.teams[1][0]]} <span class="small">${duprText[m.teams[1][0]]}</span><br>
          ${ns[m.teams[1][1]]} <span class="small">${duprText[m.teams[1][1]]}</span><br>
          <span class="small">隊伍平均 ${teamRating(m.teams[1],normalizedRatings(rawRatings)).toFixed(3)}</span>
        </div>
      </div>
    </div>`).join('');
  statsWrap.style.display='block';
  statsBody.innerHTML=ns.map((name,i)=>`
    <tr><td><b>${name}</b></td><td>${duprText[i]}</td><td>${a.played[i]}</td><td>${rounds-a.played[i]}</td>
    <td>${a.partners[i].size}</td><td>${a.opponents[i].size}</td></tr>`).join('');
}
$('#generateBtn').onclick=()=>{
  saveSettings();
  const n=+playerCount.value, rounds=Math.max(1,Math.min(30,+$('#roundCount').value||1));
  const attempts=+$('#attempts').value;
  messageEl.innerHTML=`<div class="alert warn">正在搜尋最佳賽程…</div>`;
  setTimeout(()=>{
    const rawRatings=duprValues();
    if(rawRatings.some(Number.isNaN)){
      messageEl.innerHTML=`<div class="alert warn">DUPR 請輸入 NR 或 0.000～10.000 的數字。</div>`;
      return;
    }
    const labels=duprLabels();
    const result=searchBest(n,rounds,attempts,rawRatings);
    if(!result){
      messageEl.innerHTML=`<div class="alert warn">找不到完全符合規則的賽程。請減少場數，或增加球員人數。</div>`;
      scheduleEl.className='empty';scheduleEl.textContent='本次設定無可行解。';metricsEl.style.display='none';statsWrap.style.display='none';
      lastResult=null;return;
    }
    renderResult(result,names(),rounds,rawRatings,labels);
  },20);
};
function textSchedule(){
  if(!lastResult)return '';
  return lastResult.schedule.map((m,i)=>{
    const n=lastResult.names;
    const home=m.teams[m.home], away=m.teams[m.away];
    return `第${i+1}場：主場 ${n[home[0]]}、${n[home[1]]} VS 客場 ${n[away[0]]}、${n[away[1]]}`;
  }).join('\n');
}
$('#copyBtn').onclick=async()=>{
  if(!lastResult)return alert('請先產生賽程');
  await navigator.clipboard.writeText(textSchedule());
  alert('賽程已複製');
};
$('#csvBtn').onclick=()=>{
  if(!lastResult)return alert('請先產生賽程');
  const rows=[['場次','主客場','球員1','球員1 DUPR','球員2','球員2 DUPR','對戰','主客場','球員3','球員3 DUPR','球員4','球員4 DUPR']];
  const n=lastResult.names;
  const d=lastResult.duprText;
  lastResult.schedule.forEach((m,i)=>{
    const home=m.teams[m.home], away=m.teams[m.away];
    rows.push([
      i+1,'主場',n[home[0]],d[home[0]],n[home[1]],d[home[1]],
      'VS','客場',n[away[0]],d[away[0]],n[away[1]],d[away[1]]
    ]);
  });
  const csv='\ufeff'+rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='pickleball_schedule.csv';a.click();URL.revokeObjectURL(a.href);
};
playersBox.addEventListener('input',saveSettings);
$('#roundCount').addEventListener('input',saveSettings);
</script>
</body>
